<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026: Premium Live Tracker</title>
<style>
/* Premium Black & Metallic Gold Theme */
:root {
--dark-base: #080808;
--surface: #121212;
--border-gold: #5c4716;
--hover-bg: #1a1710;
--text-muted: #888888;
}

body {
font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
background-color: var(--dark-base);
background-image: radial-gradient(circle at 50% 0%, #1f1807 0%, var(--dark-base) 40%);
color: #e0e0e0;
margin: 0;
padding: 50px 20px;
display: flex;
flex-direction: column;
align-items: center;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
}

/* Metallic Gold Gradient Text Utility */
.gold-text {
background: linear-gradient(to bottom, #fcf6ba 0%, #d4af37 40%, #aa771c 60%, #fbf5b7 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
color: #d4af37; /* Fallback */
font-weight: bold;
}

.gold-shadow {
filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.8));
}

h2 {
text-align: center;
text-transform: uppercase;
letter-spacing: 8px;
margin-bottom: 10px;
font-size: 24px;
}

.header-controls {
display: flex;
align-items: center;
gap: 15px;
margin-bottom: 40px;
flex-wrap: wrap;
justify-content: center;
}

.live-indicator {
font-size: 11px;
color: #d4af37;
letter-spacing: 3px;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 8px;
background: rgba(212, 175, 55, 0.05);
padding: 8px 16px;
border-radius: 20px;
border: 1px solid rgba(212, 175, 55, 0.2);
}

.pulse-dot {
width: 8px;
height: 8px;
background-color: #d4af37;
border-radius: 50%;
box-shadow: 0 0 8px #d4af37;
animation: pulse 2s infinite;
}

/* Notification Button */
.notify-btn {
background: transparent;
color: #d4af37;
border: 1px solid rgba(212, 175, 55, 0.5);
padding: 8px 16px;
border-radius: 20px;
font-size: 11px;
letter-spacing: 1px;
text-transform: uppercase;
cursor: pointer;
transition: all 0.2s ease;
display: flex;
align-items: center;
gap: 6px;
}

.notify-btn:hover {
background: rgba(212, 175, 55, 0.1);
border-color: #d4af37;
}

.notify-btn.granted {
border-color: #28a745;
color: #28a745;
pointer-events: none;
}

@keyframes pulse {
0% { opacity: 1; }
50% { opacity: 0.3; }
100% { opacity: 1; }
}

/* Ultra-Fast Textured Container */
.table-container {
width: 100%;
max-width: 1000px;
background-color: var(--surface);
background-image:
repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255,255,255,0.01) 1px, rgba(255,255,255,0.01) 2px),
linear-gradient(145deg, #161616 0%, #0a0a0a 100%);
border: 1px solid var(--border-gold);
border-top: 3px solid #d4af37;
border-radius: 6px;
box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(252, 246, 186, 0.2);
/* Web and Mobile Optimization: horizontal scroll for table to prevent breaking */
overflow-x: auto; 
-webkit-overflow-scrolling: touch;
}

table {
width: 100%;
border-collapse: collapse;
min-width: 650px; /* Ensures the table doesn't squish on mobile */
}

th, td {
padding: 22px 25px;
text-align: left;
border-bottom: 1px solid rgba(212, 175, 55, 0.1);
}

th {
color: #b38728;
text-transform: uppercase;
font-size: 11px;
letter-spacing: 2px;
font-weight: 600;
border-bottom: 1px solid rgba(212, 175, 55, 0.3);
background: rgba(0, 0, 0, 0.4);
}

tbody tr {
transition: background-color 0.1s ease-out;
}

tbody tr:hover {
background-color: var(--hover-bg);
}

.team-highlight {
font-weight: 700;
color: #ffffff;
letter-spacing: 0.5px;
}

.team-tbd {
color: var(--text-muted);
font-style: italic;
font-weight: 300;
}

.phase-divider td {
text-align: center;
letter-spacing: 6px;
font-size: 10px;
text-transform: uppercase;
padding: 18px;
background-color: #050505;
border-bottom: 1px solid rgba(212, 175, 55, 0.2);
border-top: 1px solid rgba(212, 175, 55, 0.2);
}

.countdown-container {
font-family: 'Courier New', Courier, monospace;
font-size: 16px;
letter-spacing: 1.5px;
background: rgba(0, 0, 0, 0.5);
padding: 6px 12px;
border-radius: 4px;
border: 1px solid rgba(212, 175, 55, 0.15);
display: inline-block;
min-width: 165px;
text-align: center;
}

.status-live {
color: #ffffff;
background: rgba(212, 175, 55, 0.2);
border-color: #d4af37;
box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
text-shadow: 0 0 8px #d4af37;
}

.status-done {
color: var(--text-muted);
background: transparent;
border-color: transparent;
}

/* Mobile Responsive Adjustments */
@media (max-width: 768px) {
body {
padding: 20px 10px;
}
h2 {
font-size: 18px;
letter-spacing: 4px;
}
th, td {
padding: 15px 12px;
font-size: 14px;
}
.countdown-container {
font-size: 14px;
min-width: 145px;
padding: 5px 8px;
}
.phase-divider td {
letter-spacing: 3px;
}
}
</style>
</head>
<body>

<div class="gold-shadow">
<h2 class="gold-text">Road to Final</h2>
</div>

<div class="header-controls">
<div class="live-indicator"><div class="pulse-dot"></div> Live Data Sync Active</div>
<button id="notifyBtn" class="notify-btn" onclick="requestNotifications()">
🔔 Enable Notifications
</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Local Date & Time</th>
<th>Matchup</th>
<th>Stage</th>
<th>Countdown</th>
</tr>
</thead>
<tbody id="schedule-body">
<tr><td colspan="4" style="text-align: center; color: #888;">Initializing tournament data...</td></tr>
</tbody>
</table>
</div>

<script>
let matches = [];
let tickInterval;
let notificationsEnabled = false;

// Initialize Notifications UI state on load
if (window.Notification && Notification.permission === "granted") {
notificationsEnabled = true;
updateNotifyBtnUI();
}

function updateNotifyBtnUI() {
const btn = document.getElementById("notifyBtn");
if (notificationsEnabled) {
btn.innerHTML = "✓ Notifications Active";
btn.classList.add("granted");
}
}

async function requestNotifications() {
if (!window.Notification) {
alert("Browser does not support notifications.");
return;
}
const permission = await Notification.requestPermission();
if (permission === "granted") {
notificationsEnabled = true;
updateNotifyBtnUI();
// Test notification
new Notification("World Cup Tracker", { body: "You will be notified 30 mins before matches and when they go live!" });
} else {
alert("Notification permission denied.");
}
}

function sendNotification(title, body) {
if (notificationsEnabled && Notification.permission === "granted") {
new Notification(title, { body });
}
}

// ==========================================
// DATA FETCHING ENGINE
// ==========================================
async function fetchMatchData() {
try {
const simulatedApiPayload = [
{ type: "match", team1: "Netherlands", team2: "Japan", time: "2026-06-15T02:00:00+06:00", group: "Group F", isTarget: "team2" },
{ type: "match", team1: "Argentina", team2: "Algeria", time: "2026-06-17T07:00:00+06:00", group: "Group J", isTarget: "team1" },
{ type: "match", team1: "Tunisia", team2: "Japan", time: "2026-06-21T10:00:00+06:00", group: "Group F", isTarget: "team2" },
{ type: "match", team1: "Argentina", team2: "Austria", time: "2026-06-22T23:00:00+06:00", group: "Group J", isTarget: "team1" },
{ type: "match", team1: "Japan", team2: "Sweden", time: "2026-06-26T05:00:00+06:00", group: "Group F", isTarget: "team1" },
{ type: "match", team1: "Jordan", team2: "Argentina", time: "2026-06-28T08:00:00+06:00", group: "Group J", isTarget: "team2" },

{ type: "divider", text: "Knockout Stages" },

{ type: "match", team1: "TBD", team2: "TBD", time: "2026-06-30T20:00:00+06:00", group: "Round of 32", isTarget: "none" },
{ type: "match", team1: "TBD", team2: "TBD", time: "2026-07-05T20:00:00+06:00", group: "Round of 16", isTarget: "none" },
{ type: "match", team1: "TBD", team2: "TBD", time: "2026-07-10T23:00:00+06:00", group: "Quarter-Finals", isTarget: "none" },
{ type: "match", team1: "TBD", team2: "TBD", time: "2026-07-15T02:00:00+06:00", group: "Semi-Finals", isTarget: "none" },
{ type: "match", team1: "TBD", team2: "TBD", time: "2026-07-19T02:00:00+06:00", group: "World Cup Final", isTarget: "none" }
];

// Merge notification tracking state into new data fetch so we don't spam
matches = simulatedApiPayload.map((newMatch, i) => {
const existingMatch = matches[i];
if (existingMatch) {
newMatch.notified30 = existingMatch.notified30 || false;
newMatch.notifiedLive = existingMatch.notifiedLive || false;
} else {
newMatch.notified30 = false;
newMatch.notifiedLive = false;
}
return newMatch;
});

buildTable();
clearInterval(tickInterval);
tick();
tickInterval = setInterval(tick, 1000);

} catch (error) {
console.error("Data sync failed:", error);
}
}

// ==========================================
// UI BUILDER
// ==========================================
function buildTable() {
const tbody = document.getElementById("schedule-body");
tbody.innerHTML = "";

matches.forEach((match, index) => {
if (match.type === "divider") {
const tr = document.createElement("tr");
tr.className = "phase-divider";
tr.innerHTML = `<td colspan="4"><span class="gold-text">${match.text}</span></td>`;
tbody.appendChild(tr);
return;
}

const tr = document.createElement("tr");
const dateObj = new Date(match.time);
const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
const dateDisplay = dateObj.toLocaleString(undefined, options);

let class1 = match.isTarget === "team1" ? "team-highlight" : (match.team1 === "TBD" ? "team-tbd" : "");
let class2 = match.isTarget === "team2" ? "team-highlight" : (match.team2 === "TBD" ? "team-tbd" : "");

tr.innerHTML = `
<td>${dateDisplay}</td>
<td><span class="${class1}">${match.team1}</span> vs <span class="${class2}">${match.team2}</span></td>
<td>${match.group}</td>
<td>
<div id="countdown-${index}" class="countdown-container gold-text">
00d 00h 00m 00s
</div>
</td>
`;
tbody.appendChild(tr);
});
}

// ==========================================
// ZERO-LAG COUNTDOWN & NOTIFICATION ENGINE
// ==========================================
function tick() {
const now = new Date().getTime();

matches.forEach((match, index) => {
if (match.type === "divider") return;

const matchTime = new Date(match.time).getTime();
const distance = matchTime - now;
const el = document.getElementById(`countdown-${index}`);

// Notification Logic
if (notificationsEnabled && match.team1 !== "TBD" && match.team2 !== "TBD") {
const thirtyMins = 30 * 60 * 1000;
// Trigger 30 minute warning
if (distance <= thirtyMins && distance > 0 && !match.notified30) {
sendNotification("Match Starting Soon!", `${match.team1} vs ${match.team2} begins in 30 minutes.`);
match.notified30 = true;
}
// Trigger exact Live warning
if (distance <= 0 && distance > -7200000 && !match.notifiedLive) {
sendNotification("Match is LIVE!", `${match.team1} vs ${match.team2} has officially kicked off.`);
match.notifiedLive = true;
}
}

if (!el) return;

let text = "";
let className = "countdown-container";

if (distance < 0 && distance > -7200000) {
text = "LIVE NOW";
className += " status-live";
} else if (distance <= -7200000) {
text = "FINISHED";
className += " status-done";
} else {
const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

text = `${days.toString().padStart(2, '0')}d ${hours.toString().padStart(2, '0')}h ${minutes.toString().padStart(2, '0')}m ${seconds.toString().padStart(2, '0')}s`;
className += " gold-text";
}

if (el.innerText !== text) {
el.innerText = text;
el.className = className;
}
});
}

// Initialize
fetchMatchData();
setInterval(fetchMatchData, 300000);
</script>
</body>
</html>
